name: Benchmarks
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      scope:
        description: Benchmark scope to publish
        required: true
        default: smoke
        type: choice
        options: [smoke, full]

permissions:
  contents: write

concurrency:
  group: inlier-benchmark-pages
  cancel-in-progress: false

jobs:
  benchmark:
    runs-on: ubuntu-24.04
    # Manual full runs use enough seeds for a useful uncertainty estimate;
    # the scheduled reference run uses 30. Keep PR smoke runs quick while
    # allowing the full matrix to complete without the old 15-minute limit.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: soraxas/inlier
          path: inlier-target
          submodules: recursive
      - uses: actions/checkout@v4
        with:
          repository: soraxas/inlier-data
          path: inlier-data
      - name: Record implementation revision
        shell: bash
        run: |
          echo "BENCHMARK_TARGET_REVISION=$(git -C inlier-target rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "BENCHMARK_TARGET_REPOSITORY=soraxas/inlier" >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v5
      - name: Expose sibling checkout paths
        shell: bash
        run: |
          ln -s "$GITHUB_WORKSPACE/inlier-target" "$GITHUB_WORKSPACE/../inlier"
          ln -s "$GITHUB_WORKSPACE/inlier-data" "$GITHUB_WORKSPACE/../inlier-data"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
      - uses: ./.github/actions/benchmark-run
        with:
          smoke: ${{ github.event_name != 'schedule' && !(github.event_name == 'workflow_dispatch' && inputs.scope == 'full') }}
          seeds: ${{ github.event_name == 'schedule' && '30' || (github.event_name == 'workflow_dispatch' && inputs.scope == 'full' && '10' || '5') }}
          phototourism-pairs: ${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.scope == 'full')) && '8' || '1' }}
          homography-pairs: ${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.scope == 'full')) && '16' || '2' }}
          scope: ${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.scope == 'full')) && 'full' || 'smoke' }}
      - name: Gate PR quality and cost
        if: github.event_name == 'pull_request'
        run: |
          curl --fail --silent --show-error -o baseline/summary.json https://cs.tinyiu.com/inlier-benchmarks/latest.json || true
          uv run --no-project python/regress.py results/summary.json baseline/summary.json
          cat site/summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Gate full paired quality
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.scope == 'full')
        run: |
          curl --fail --silent --show-error -o baseline/summary.json https://cs.tinyiu.com/inlier-benchmarks/latest.json || true
          uv run --no-project python/regress.py results/summary.json baseline/summary.json
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: |
            results/
            site/
      - name: Publish main benchmark dashboard
        if: github.ref == 'refs/heads/main' && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.scope == 'full'))
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: site
          keep_files: true
