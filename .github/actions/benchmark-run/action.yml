name: Run inlier benchmark
description: Run the Rust matrix and produce JSONL, summary, and interactive report.
inputs:
  smoke:
    required: false
    default: "false"
  seeds:
    required: false
    default: "30"
  phototourism-pairs:
    required: false
    default: "1"
  homography-pairs:
    required: false
    default: "2"
  pnp-cases:
    required: false
    default: "1"
  scope:
    required: false
    default: smoke
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        args="--seeds ${{ inputs.seeds }} --output results/raw.jsonl"
        if [ "${{ inputs.smoke }}" = "true" ]; then args="$args --smoke"; fi
        cargo run --release -- $args
    - name: Cache benchmark data artifacts
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}/inlier-data/main
        key: inlier-data-artifacts-v1-${{ runner.os }}-${{ hashFiles('inlier-data/inlier_data/release_artifacts.json') }}
        restore-keys: |
          inlier-data-artifacts-v1-${{ runner.os }}-
    - shell: bash
      run: |
        command -v zstd
        uv run --no-project --with numpy --with opencv-python-headless \
          python -m unittest python/test_evaluate_phototourism.py python/test_evaluate_absolute_pose.py python/test_opencv_reference.py
        uv run --no-project python -m unittest python/test_aggregate.py python/test_regress.py
        uv run --no-project --with-editable ./inlier-data --with h5py \
          python/prepare_phototourism.py \
          --cache-dir "$RUNNER_TEMP/inlier-data" \
          --pairs "${{ inputs.phototourism-pairs }}" \
          --max-correspondences 512 \
          --output results/phototourism-input.json
        real_args="--seeds ${{ inputs.seeds }}"
        if [ "${{ inputs.smoke }}" = "true" ]; then real_args="--smoke --seeds 1"; fi
        cargo run --release -- \
          $real_args \
          --phototourism-input results/phototourism-input.json \
          --output results/phototourism.jsonl
        uv run --no-project --with numpy --with opencv-python-headless \
          python/evaluate_phototourism.py \
          --input results/phototourism-input.json \
          --results results/phototourism.jsonl
        uv run --no-project python - <<'PY'
        import json
        from pathlib import Path

        trials = [json.loads(line) for line in Path("results/phototourism.jsonl").read_text().splitlines()]
        for trial in trials:
            if trial["success"] and (trial.get("epipolar_matrix") is None or trial.get("inlier_indices") is None):
                raise SystemExit("successful PhotoTourism trial is missing pose-evaluation payload")
        PY
        cat results/phototourism.jsonl >> results/raw.jsonl
        uv run --no-project --with-editable ./inlier-data --with numpy \
          python/prepare_epos_pnp.py \
          --cache-dir "$RUNNER_TEMP/inlier-data" \
          --cases "${{ inputs.pnp-cases }}" \
          --max-correspondences 512 \
          --output results/epos-pnp-input.json
        cargo run --release -- \
          $real_args \
          --absolute-pose-input results/epos-pnp-input.json \
          --output results/epos-pnp.jsonl
        uv run --no-project --with numpy \
          python/evaluate_absolute_pose.py \
          --input results/epos-pnp-input.json \
          --results results/epos-pnp.jsonl
        uv run --no-project python - <<'PY'
        import json
        from pathlib import Path

        trials = [json.loads(line) for line in Path("results/epos-pnp.jsonl").read_text().splitlines()]
        for trial in trials:
            if trial["success"] and (trial.get("absolute_pose") is None or trial.get("inlier_indices") is None):
                raise SystemExit("successful EPOS PnP trial is missing pose-evaluation payload")
        PY
        cat results/epos-pnp.jsonl >> results/raw.jsonl
        uv run --no-project --with-editable ./inlier-data --with h5py \
          python/prepare_homography.py \
          --cache-dir "$RUNNER_TEMP/inlier-data" \
          --pairs "${{ inputs.homography-pairs }}" \
          --max-correspondences 512 \
          --output results/homography-input.json
        cargo run --release -- \
          $real_args \
          --homography-input results/homography-input.json \
          --output results/homography.jsonl
        cat results/homography.jsonl >> results/raw.jsonl
        reference_args="--seeds ${{ inputs.seeds }}"
        if [ "${{ inputs.smoke }}" = "true" ]; then reference_args="--smoke --seeds 1"; fi
        uv run --no-project --with numpy --with opencv-python-headless \
          python/run_opencv_reference.py \
          --phototourism-input results/phototourism-input.json \
          --homography-input results/homography-input.json \
          $reference_args \
          --output results/opencv-reference.jsonl
        uv run --no-project --with numpy --with opencv-python-headless \
          python/evaluate_phototourism.py \
          --input results/phototourism-input.json \
          --results results/opencv-reference.jsonl
        cat results/opencv-reference.jsonl >> results/raw.jsonl
        uv run --no-project --with-editable ./inlier-data --with numpy \
          python/prepare_rigid.py \
          --cache-dir "$RUNNER_TEMP/inlier-data" \
          --max-correspondences 1024 \
          --output results/rigid-input.json
        cargo run --release -- \
          $real_args \
          --rigid-input results/rigid-input.json \
          --output results/rigid.jsonl
        cat results/rigid.jsonl >> results/raw.jsonl
    - shell: bash
      run: |
        uv run --no-project --with numpy python/aggregate.py results/raw.jsonl results/summary.json
        mkdir -p site/history
        curl --fail --silent --show-error \
          -o site/history/index.json \
          https://cs.tinyiu.com/inlier-benchmarks/history/index.json || true
        BENCHMARK_SCOPE="${{ inputs.scope }}" \
          uv run --no-project python/report.py results/summary.json site
